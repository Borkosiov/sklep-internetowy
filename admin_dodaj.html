<!DOCTYPE html>

<meta name="description" content="Panel dodawania produktu w sklepie LEGO">

</head>

<body>

<header>

<div class="top-info">
<p>Panel administracyjny sklepu</p>
</div>

<div class="header-inner">

<div class="logo">
<h1>SKLEP</h1>
</div>

<div class="user-links">
<a href="admin_produkty.html">Produkty</a>
<a href="admin_sprzedaz.html">Sprzedaż</a>
</div>

</div>

</header>

<main>

<section class="admin">

<h2>Dodaj produkt</h2>

<form class="admin-form">

<label for="name">Nazwa produktu</label>
<input id="name" type="text" required>

<label for="price">Cena</label>
<input id="price" type="number" required>

<label for="description">Opis</label>
<textarea id="description" rows="4"></textarea>

<label for="image">Zdjęcie produktu</label>
<input id="image" type="file">

<button type="submit">Dodaj produkt</button>

</form>

</section>

</main>

<footer>

<div class="footer-inner">

<div>

<h3>Panel</h3>

<ul>
<li><a href="admin_produkty.html">Produkty</a></li>
<li><a href="admin_sprzedaz.html">Sprzedaż</a></li>
</ul>

</div>

</div>

</p>

</footer>

</html>
